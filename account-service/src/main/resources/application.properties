spring.application.name=account-service
server.port=8081

spring.datasource.url=jdbc:h2:mem:account_service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c

logging.structured.format.console=logstash
logging.structured.json.rename.[@timestamp]=timestamp
logging.structured.json.rename.logger_name=logger
logging.structured.json.add.service=${spring.application.name}
